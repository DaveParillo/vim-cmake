name: Test

on:
  push:
    branches: [ master, vim-cmake-updates ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            install: |
              sudo apt-get update
              sudo apt-get install -y vim cmake
            vim_path: ""
            run: vim -Es --cmd 'set packpath=' -u test/.vimrc -c 'Vader! test/cmake.vader'

          - os: windows-latest
            install: |
              winget install --id vim.vim --silent --accept-package-agreements --accept-source-agreements
              winget install --id Kitware.CMake --silent --accept-package-agreements --accept-source-agreements
            vim_path: |
              $vimpath = Get-ChildItem "C:\Program Files\Vim" -Directory | Select-Object -Last 1
              echo "$vimpath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            run: vim -Es --cmd "set packpath=" -u test/.vimrc -c "Vader! test/cmake.vader"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Add Vim to PATH
        if: matrix.vim_path != ''
        run: ${{ matrix.vim_path }}

      - name: Clone vader.vim
        run: git clone https://github.com/junegunn/vader.vim test/vader.vim

      - name: Run tests
        run: ${{ matrix.run }}
