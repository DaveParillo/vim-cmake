name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y vim cmake

      - name: Clone vader.vim
        run: git clone --depth 1 https://github.com/junegunn/vader.vim test/vader.vim

      - name: Run tests
        run: vim -Es --cmd 'set packpath=' -u test/.vimrc -c 'Vader! test/cmake.vader'

